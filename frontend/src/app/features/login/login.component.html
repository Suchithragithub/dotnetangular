<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="row w-100 justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-4">
      <div class="card shadow-lg border-0">
        <div class="card-body p-4 p-md-5">
          <!-- Header -->
          <div class="text-center mb-4">
            <div class="mb-3">
              <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-person-circle text-primary" viewBox="0 0 16 16">
                <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
              </svg>
            </div>
            <h2 class="fw-bold mb-2">Student Login</h2>
            <p class="text-muted">Enter your credentials to access your account</p>
          </div>

          <!-- Error Alert -->
          <div *ngIf="error()" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            {{ error() }}
            <button type="button" class="btn-close" (click)="error.set(null)" aria-label="Close"></button>
          </div>

          <!-- Login Form -->
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
            <!-- Registration Number Field -->
            <div class="mb-3">
              <label for="regno" class="form-label fw-semibold">Registration Number</label>
              <input
                type="text"
                id="regno"
                class="form-control form-control-lg"
                formControlName="regno"
                placeholder="Enter your registration number"
                [class.is-invalid]="regnoControl?.invalid && regnoControl?.touched"
              />
              <div *ngIf="regnoControl?.invalid && regnoControl?.touched" class="invalid-feedback">
                <span *ngIf="regnoControl?.errors?.['required']">Registration number is required</span>
              </div>
            </div>

            <!-- Password Field -->
            <div class="mb-4">
              <label for="password" class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <input
                  [type]="passwordVisible() ? 'text' : 'password'"
                  id="password"
                  class="form-control form-control-lg"
                  formControlName="password"
                  placeholder="Enter your password"
                  [class.is-invalid]="passwordControl?.invalid && passwordControl?.touched"
                />
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  (click)="togglePasswordVisibility()"
                  [attr.aria-label]="passwordVisible() ? 'Hide password' : 'Show password'"
                >
                  <i [class]="passwordVisible() ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                </button>
              </div>
              <div *ngIf="passwordControl?.invalid && passwordControl?.touched" class="invalid-feedback d-block">
                <span *ngIf="passwordControl?.errors?.['required']">Password is required</span>
              </div>
            </div>

            <!-- Submit Button -->
            <div class="d-grid mb-3">
              <button
                type="submit"
                class="btn btn-primary btn-lg"
                [disabled]="loading()"
              >
                <span *ngIf="!loading()">Login</span>
                <span *ngIf="loading()" class="d-flex align-items-center justify-content-center">
                  <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                  Logging in...
                </span>
              </button>
            </div>

            <!-- Additional Links -->
            <div class="text-center">
              <a routerLink="/forgot-password" class="text-decoration-none small">Forgot Password?</a>
            </div>
          </form>
        </div>

        <!-- Card Footer -->
        <div class="card-footer bg-light text-center py-3">
          <p class="mb-0 text-muted small">
            Don't have an account? <a routerLink="/register" class="text-decoration-none fw-semibold">Register here</a>
          </p>
        </div>
      </div>

      <!-- Admin Login Link -->
      <div class="text-center mt-3">
        <a routerLink="/admin/login" class="text-muted text-decoration-none small">
          <i class="bi bi-shield-lock me-1"></i>
          Admin Login
        </a>
      </div>
    </div>
  </div>
</div>
